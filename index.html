<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abhijith & Amritha</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:'Cormorant Garamond',serif;
background:black;
}

.page{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
background:url('background.PNG') center center/cover no-repeat;
transition:1.5s ease;
}

.page::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
backdrop-filter:blur(2px);
}

.page>*{
position:relative;
z-index:2;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.05);
}

/* PAGE 1 */

.tagline{
color:#f3e5ab;
font-size:2rem;
letter-spacing:2px;
margin-bottom:30px;
animation:fadeUp 2s ease;
}

.enter-btn{
padding:14px 34px;
border:1px solid #f3e5ab;
background:transparent;
color:#f3e5ab;
font-size:1rem;
letter-spacing:2px;
border-radius:40px;
cursor:pointer;
}

/* PAGE 2 */

.names{
font-family:'Pinyon Script',cursive;
font-size:7rem;
color:#f3e5ab;
line-height:1.3;
opacity:0;
filter:blur(15px);
animation:nameReveal 2.8s ease forwards;
}

.heart{
width:38px;
height:auto;
margin:10px 0;
opacity:0;
filter:blur(8px);
animation:heartReveal 2s ease 1.3s forwards;
}

/* PAGE 3 */

.invite{
color:#f3e5ab;
max-width:700px;
padding:40px;
}

.title-line{
font-family:'Pinyon Script',cursive;
font-size:2rem;
margin-bottom:30px;
}

.couple{
font-family:'Pinyon Script',cursive;
font-size:2.8rem;
letter-spacing:1px;
margin-bottom:30px;
}

.details{
font-family:'Pinyon Script',cursive;
font-size:2rem;
margin-bottom:20px;
}

.venue{
font-family:'Pinyon Script',cursive;
font-size:2rem;
margin-bottom:35px;
}

.location-pin{
text-decoration:none;
font-size:1.2rem;
margin-left:8px;
}

.footer{
font-family:'Pinyon Script',cursive;
font-size:1.7rem;
margin-bottom:40px;
}

.countdown{
font-family:'Pinyon Script',cursive;
font-size:1.7rem;
}

#timer{
font-size:1.4rem;
margin-top:10px;
letter-spacing:2px;
}

@keyframes nameReveal{
0%{
opacity:0;
filter:blur(20px);
}
100%{
opacity:1;
filter:blur(0);
}
}

@keyframes heartReveal{
0%{
opacity:0;
transform:scale(.8);
filter:blur(8px);
}
100%{
opacity:1;
transform:scale(1);
filter:blur(0);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:768px){

.names{
font-size:5rem;
}

.couple{
font-size:2.3rem;
}

.title-line,
.details,
.venue{
font-size:1.7rem;
}

.footer,
.countdown{
font-size:1.4rem;
}

.tagline{
font-size:1.5rem;
}

}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->

<section id="page1" class="page">

<div class="tagline">
A Beautiful Moment Awaits
</div>

<button class="enter-btn" onclick="startInvitation()">
Step Into Our Story
</button>

</section>

<!-- PAGE 2 -->

<section id="page2" class="page hidden">

<div class="names">
Abhijith
</div>

<img src="heart.PNG" class="heart">

<div class="names" style="animation-delay:.7s;">
Amritha
</div>

</section>
<!-- PAGE 3 -->

<section id="page3" class="page hidden">

<div class="invite">

<div class="title-line">
Join us as we celebrate
</div>

<div class="couple">
ABHIJITH & AMRITHA
</div>

<div class="details">
12 September 2026 • 10:30 AM
</div>

<div class="venue">
Paradise Convention Hall
<a href="https://maps.app.goo.gl/8pVgrK9qQFFdyAyM7?g_st=ic"
target="_blank"
class="location-pin">📍</a>
</div>

<div class="footer">
Your presence will make our celebration truly special.
</div>

<div class="countdown">
Counting Down To Our Day
<div id="timer"></div>
</div>

</div>

</section>

<script>

function startInvitation(){

let music=document.getElementById("music");

music.currentTime=6;

music.play().catch(()=>{});

document.getElementById("page1").classList.add("hidden");

document.getElementById("page2").classList.remove("hidden");

setTimeout(()=>{

document.getElementById("page2").classList.add("hidden");

document.getElementById("page3").classList.remove("hidden");

},4000);

}

const targetDate =
new Date("September 12, 2026 10:30:00").getTime();

setInterval(()=>{

let now = new Date().getTime();

let diff = targetDate - now;

let d=Math.floor(diff/(1000*60*60*24));

let h=Math.floor(
(diff%(1000*60*60*24))/(1000*60*60)
);

let m=Math.floor(
(diff%(1000*60*60))/(1000*60)
);

let s=Math.floor(
(diff%(1000*60))/1000
);

document.getElementById("timer").innerHTML =
`${d}D : ${h}H : ${m}M : ${s}S`;

},1000);

</script>

</body>
</html>
