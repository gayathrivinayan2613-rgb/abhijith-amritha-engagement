<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhijith & Amritha</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Cormorant Garamond',serif;
overflow-x:hidden;
}

section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:25px;
}

.violet{
background:url('background.PNG') center/cover;
color:#f5e6b3;
}

.cream{
background:url('cream.PNG') center/cover;
color:#3b1d3f;
}

h1{
font-family:'Great Vibes',cursive;
font-size:4rem;
}

h2{
font-size:1.8rem;
margin-bottom:10px;
}

p{
font-size:1.2rem;
max-width:600px;
}

.heart{
width:90px;
margin:15px 0;
}

.btn{
padding:12px 28px;
border:2px solid #f5e6b3;
background:transparent;
color:#f5e6b3;
font-size:16px;
border-radius:30px;
margin-top:20px;
}

.hidden{display:none;}

.countdown{
display:flex;
gap:10px;
margin-top:20px;
}

.box{
border:1px solid currentColor;
padding:10px;
min-width:70px;
}

.box span{
font-size:1.6rem;
display:block;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="violet" style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;">
<h1>Abhijith ♥ Amritha</h1>
<p>Engagement Invitation</p>
<button class="btn" onclick="start()">Open Invitation</button>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div id="content" class="hidden">

<!-- Scene 1 -->
<section class="violet">
<h2>A New Chapter Begins</h2>
</section>

<!-- Scene 2 Names -->
<section class="cream">
<h1>Abhijith</h1>
<img src="heart.PNG" class="heart">
<h1>Amritha</h1>
</section>

<!-- Scene 3 -->
<section class="violet">
<h2>Where Our Forever Begins</h2>
</section>

<!-- Scene 4 Details -->
<section class="cream">
<h2>12 September 2026</h2>
<p>10:30 AM</p>
<p>Paradise Convention Hall</p>

<a href="https://maps.app.goo.gl/8pVgrK9qQFFdyAyM7?g_st=ic" target="_blank" class="btn" style="color:#3b1d3f;border-color:#3b1d3f;">
View Location
</a>
</section>

<!-- Scene 5 Countdown -->
<section class="violet">
<h2>Countdown</h2>

<div class="countdown">
<div class="box"><span id="d">0</span>Days</div>
<div class="box"><span id="h">0</span>Hrs</div>
<div class="box"><span id="m">0</span>Min</div>
<div class="box"><span id="s">0</span>Sec</div>
</div>

</section>

<!-- Scene 6 -->
<section class="cream">
<h2>Your presence will make it special</h2>
</section>

</div>

<script>

function start(){
document.getElementById("intro").style.display="none";
document.getElementById("content").classList.remove("hidden");
document.getElementById("music").play();
}

let date = new Date("Sep 12, 2026 10:30:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = date - now;

document.getElementById("d").innerText = Math.floor(diff/(1000*60*60*24));
document.getElementById("h").innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
document.getElementById("m").innerText = Math.floor((diff%(1000*60*60))/(1000*60));
document.getElementById("s").innerText = Math.floor((diff%(1000*60))/1000);

},1000);

</script>

</body>
</html>
