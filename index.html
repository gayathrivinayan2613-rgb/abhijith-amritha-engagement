<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engagement Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cormorant Garamond',serif;
background:black;
overflow-x:hidden;
color:white;
}

/* INTRO SCREEN */
#intro{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url('background.PNG') center/cover;
position:relative;
}

#intro::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
}

#intro *{
position:relative;
z-index:2;
}

h1{
font-family:'Great Vibes',cursive;
font-size:4rem;
text-shadow:0 0 20px rgba(255,255,255,0.4);
}

p{
font-size:1.2rem;
margin-top:10px;
}

.btn{
margin-top:20px;
padding:12px 28px;
border:2px solid white;
background:transparent;
color:white;
border-radius:30px;
cursor:pointer;
}

/* SECTIONS */
section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
opacity:0;
transform:translateY(60px) scale(0.98);
transition:1.5s ease;
padding:20px;
}

section.show{
opacity:1;
transform:translateY(0) scale(1);
}

section::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
}

section > *{
position:relative;
z-index:2;
}

.violet{
background:url('background.PNG') center/cover;
color:#f5e6b3;
}

.cream{
background:url('cream.PNG') center/cover;
color:#3b1d3f;
}

/* DRAMATIC NAME SCENE */
.name-wrap{
display:flex;
align-items:center;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.name{
font-size:5rem;
font-family:'Great Vibes',cursive;
opacity:0;
transform:scale(0.3);
animation: nameReveal 2.2s ease forwards;
text-shadow:0 0 30px rgba(255,255,255,0.3);
}

.left{ animation-delay:0.3s; }
.right{ animation-delay:0.7s; }

.heart{
width:120px;
opacity:0;
transform:scale(0);
animation: heartPop 1.5s ease forwards;
animation-delay:1.2s;
filter:drop-shadow(0 0 20px #ff4d6d);
}

@keyframes nameReveal{
0%{opacity:0;transform:scale(0.3) translateY(40px);filter:blur(10px);}
60%{opacity:1;transform:scale(1.2);}
100%{opacity:1;transform:scale(1);filter:blur(0);}
}

@keyframes heartPop{
0%{opacity:0;transform:scale(0);}
70%{opacity:1;transform:scale(1.3);}
100%{opacity:1;transform:scale(1);}
}

/* COUNTDOWN */
.countdown{
display:flex;
gap:10px;
margin-top:20px;
}

.box{
border:1px solid currentColor;
padding:10px;
min-width:70px;
}

.box span{
font-size:1.6rem;
display:block;
}

.hidden{display:none;}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1>Abhijith ♥ Amritha</h1>
<p>Engagement Invitation</p>
<button class="btn" onclick="start()">Open Invitation</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- CONTENT -->
<div id="content" class="hidden">

<section class="violet">
<h1>A New Chapter Begins</h1>
</section>

<section class="cream">
<div class="name-wrap">
<h1 class="name left">Abhijith</h1>
<img src="heart.PNG" class="heart">
<h1 class="name right">Amritha</h1>
</div>
</section>

<section class="violet">
<h2>Where Forever Starts</h2>
</section>

<section class="cream">
<h2>12 September 2026</h2>
<p>10:30 AM</p>
<p>Paradise Convention Hall</p>
<a class="btn" href="https://maps.app.goo.gl/8pVgrK9qQFFdyAyM7?g_st=ic" target="_blank">View Location</a>
</section>

<section class="violet">
<h2>Countdown to Our Moment</h2>

<div class="countdown">
<div class="box"><span id="d">0</span>Days</div>
<div class="box"><span id="h">0</span>Hrs</div>
<div class="box"><span id="m">0</span>Min</div>
<div class="box"><span id="s">0</span>Sec</div>
</div>

</section>

<section class="cream">
<h2>Your presence completes this story</h2>
</section>

</div>

<script>

// START EXPERIENCE
function start(){
document.getElementById("intro").style.display="none";
document.getElementById("content").classList.remove("hidden");

let music = document.getElementById("music");
music.currentTime = 6;
music.volume = 0.6;
music.play().catch(()=>{});
}

// SCROLL CINEMA EFFECT
const sections = document.querySelectorAll("section");

const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
},{threshold:0.4});

sections.forEach(s=>observer.observe(s));

// COUNTDOWN
let date = new Date("Sep 12, 2026 10:30:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = date - now;

if(diff < 0) diff = 0;

document.getElementById("d").innerText = Math.floor(diff/(1000*60*60*24));
document.getElementById("h").innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
document.getElementById("m").innerText = Math.floor((diff%(1000*60*60))/(1000*60));
document.getElementById("s").innerText = Math.floor((diff%(1000*60))/1000);

},1000);

</script>

</body>
</html>
